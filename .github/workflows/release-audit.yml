name: release-audit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  trust-boundary-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run release audit
        run: |
          ./scripts/audit_release.sh
